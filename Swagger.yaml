  /offices/{officeId}/floors/{floorId}/layers/{layerId}/zones:
    parameters:
      - in: path
        name: officeId
        required: true
        schema: { type: integer }
      - in: path
        name: floorId
        required: true
        schema: { type: integer }
      - in: path
        name: layerId
        required: true
        schema: { type: integer }
    post:
      tags: [Zones]
      summary: Создать зону (только для custom-слоя)
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ZoneCreateRequest' }
            examples:
              create:
                value: { name: "Коворкинг", status: "free", coordinates: [0,0, 90,0, 90,60, 0,60, 0,0, 45,30] }
      responses:
        '201':
          description: Создано
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ZoneCreateResponse' }
              examples:
                created:
                  value: { zoneId: 301, coordinates: [0,0, 90,0, 90,60, 0,60, 0,0, 45,30] }
        '400':
          description: Ошибка валидации; попытка создать зону на не-custom слое; самопересекающийся полигон
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                coords:
                  $ref: '#/components/examples/ExampleValidationCoordinates'
                notCustom:
                  value: { code: "LAYER_TYPE_FORBIDDEN", message: "Zones are not allowed for firesafe layer", traceId: "01HX..." }
                selfIntersect:
                  value: { code: "VALIDATION_ERROR", message: "Polygon is self-intersecting", details: { field: "coordinates" }, traceId: "01HX..." }
        '404':
          description: Слой не найден
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' }, examples: { notFound: { $ref: '#/components/examples/ExampleNotFound' } } } }

  /offices/{officeId}/floors/{floorId}/layers/{layerId}/zones/{zoneId}:
    parameters:
      - in: path
        name: officeId
        required: true
        schema: { type: integer }
      - in: path
        name: floorId
        required: true
        schema: { type: integer }
      - in: path
        name: layerId
        required: true
        schema: { type: integer }
      - in: path
        name: zoneId
        required: true
        schema: { type: integer }
    patch:
      tags: [Zones]
      summary: Частичное изменение зоны
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ZonePatchRequest' }
            examples:
              patch:
                value: { name: "Опенспейс", status: "occupied" }
      responses:
        '200':
          description: Обновлено
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated: { type: boolean, example: true }
              examples:
                ok:
                  value: { updated: true }
        '400':
          description: Ошибка валидации (в т.ч. координаты < 6 чисел, нечётное число координат, самопересечение полигона)
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' }, examples: { coords: { $ref: '#/components/examples/ExampleValidationCoordinates' } } } }
        '404':
          description: Зона не найдена
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' }, examples: { notFound: { $ref: '#/components/examples/ExampleNotFound' } } } }

  /offices/{officeId}/floors/{floorId}/zones/{zoneId}/objects:
    parameters:
      - in: path
        name: officeId
        required: true
        schema: { type: integer }
      - in: path
        name: floorId
        required: true
        schema: { type: integer }
      - in: path
        name: zoneId
        required: true
        schema: { type: integer }
    get:
      tags: [Zone Objects]
      summary: Список объектов в зоне
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ZoneObject' }
              examples:
                ok:
                  value:
                    - { id: 501, zoneId: 301, zoneInventoryId: 901, x: 12.3, y: 45.6, rotation: 0, catalog: { id: "chair", displayName: "Стул офисный", iconKey: "chair-01", category: "furniture" } }
                    - { id: 502, zoneId: 301, zoneInventoryId: 902, x: 22.0, y: 50.0, rotation: 90, catalog: { id: "desk", displayName: "Стол", iconKey: "desk-02", category: "furniture" } }
        '400':
          description: Некорректный zoneId
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                badId:
                  value: { code: "VALIDATION_ERROR", message: "zoneId must be a positive integer", details: { field: "zoneId" }, traceId: "01HX..." }
    post:
      tags: [Zone Objects]
      summary: Создать объект в зоне (занимает 1 слот ZoneInventory)
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ZoneObjectCreateRequest' }
            examples:
              create:
                value: { zoneInventoryId: 901, x: 10.0, y: 20.0, rotation: 0 }
      responses:
        '201':
          description: Создано
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ZoneObject' }
              examples:
                created:
                  value: { id: 503, zoneId: 301, zoneInventoryId: 901, x: 10.0, y: 20.0, rotation: 0, catalog: { id: "chair", displayName: "Стул офисный", iconKey: "chair-01", category: "furniture" } }
        '400':
          description: Ошибка валидации (например, нечисловые координаты); нехватка слотов ZoneInventory
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                noSlots:
                  value: { code: "INSUFFICIENT_STOCK", message: "No available slots in ZoneInventory#901", traceId: "01HX..." }
                badPayload:
                  value: { code: "VALIDATION_ERROR", message: "x must be a number", details: { field: "x" }, traceId: "01HX..." }
        '404':
          description: Зона/ZoneInventory не найдены или ZoneInventory не принадлежит зоне
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                invNotBelongs:
                  value: { code: "NOT_FOUND", message: "ZoneInventory#901 does not belong to Zone#301", traceId: "01HX..." }

  /offices/{officeId}/floors/{floorId}/zones/{zoneId}/objects/{id}:
    parameters:
      - in: path
