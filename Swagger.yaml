  /offices/{officeId}/floors/{floorId}/layers/{layerId}:
    parameters:
      - in: path
        name: officeId
        required: true
        schema: { type: integer }
      - in: path
        name: floorId
        required: true
        schema: { type: integer }
      - in: path
        name: layerId
        required: true
        schema: { type: integer }
    get:
      tags: [Layers]
      summary: Детали слоя
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Layer' }
              examples:
                firesafe:
                  value: { id: 201, name: "Пожарный план", type: "firesafe", imageUrl: "https://cdn.example.com/firesafe/101.png" }
                custom:
                  value:
                    id: 202
                    name: "Департаменты"
                    type: "custom"
                    zones:
                      - { id: 301, name: "R&D", status: "free", coordinates: [10,10, 100,10, 100,100, 10,100, 10,10, 55,55] }
        '404':
          description: Слой не найден
