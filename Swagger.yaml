        '204': { description: Удалён без тела }
        '400':
          description: Нельзя удалить firesafe-слой
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' }, examples: { badType: { code: "LAYER_TYPE_FORBIDDEN", message: "Cannot delete firesafe layer", traceId: "01HX..." } } } }
